    const cb = document.createElement("input"); cb.type = "checkbox"; cb.value = oc.id;
    if ((c.dependsOn || []).includes(oc.id)) cb.checked = true;
    lbl.append(cb, document.createTextNode(`${oc.title} (${oc.kind})`));
    depList.appendChild(lbl);
  }

  document.getElementById("editorTitle").textContent =
    c.aiProposalId ? "Ghost clip (AI proposal)" : "Edit clip";

  body.appendChild(field("Title", title));
  const tr = document.createElement("div"); tr.className = "field-row";
  tr.appendChild(field("Kind", kind));
  tr.appendChild(field("Track", track));
  body.appendChild(tr);
  const tr2 = document.createElement("div"); tr2.className = "field-row";
  tr2.appendChild(field("Start", start));
  tr2.appendChild(field("End", end));
  body.appendChild(tr2);
  const tr3 = document.createElement("div"); tr3.className = "field-row";
  tr3.appendChild(field("Effort (1–5)", effort));
  tr3.appendChild(field("Status", status));
  body.appendChild(tr3);

  const recWrap = document.createElement("div");
  const recRow = document.createElement("div"); recRow.className = "field-row";
  recRow.appendChild(field("Recurrence freq", recFreq));
  recRow.appendChild(field("Recurrence until", recUntil));
  recWrap.appendChild(recRow);

  const disWrap = document.createElement("div");
  const disRow = document.createElement("div"); disRow.className = "field-row";
  disRow.appendChild(field("Disrupt before (mo)", disBefore));
  disRow.appendChild(field("Disrupt after (mo)", disAfter));
  disRow.appendChild(field("Reduction (0–1)", disRed));
  disWrap.appendChild(disRow);

  function syncKindRows() {
    recWrap.style.display = (kind.value === "recurring") ? "" : "none";
    disWrap.style.display = (kind.value === "event") ? "" : "none";
    // milestones / events: end = null
    end.disabled = (kind.value !== "goal");
  }
  kind.onchange = syncKindRows;
  body.appendChild(recWrap);
  body.appendChild(disWrap);
  syncKindRows();

  const winRow = document.createElement("div"); winRow.className = "field-row";
  winRow.appendChild(field("Window earliest", winEar));
  winRow.appendChild(field("Window latest", winLat));
  body.appendChild(winRow);

  body.appendChild(field("Depends on", depList));
  body.appendChild(field("Notes", notes));

  document.getElementById("editor").classList.add("open");

  document.getElementById("editorSave").onclick = () => {
    c.title = title.value.trim() || "Untitled";
    c.kind = kind.value;
    c.trackId = track.value;
    c.start = start.value || c.start;
    c.end = (c.kind === "goal") ? (end.value || null) : null;
    c.effort = Math.max(1, Math.min(5, parseInt(effort.value, 10) || 3));
    c.status = status.value;
    c.notes = notes.value;
    if (c.kind === "recurring") {
      c.recurrence = { freq: recFreq.value, until: recUntil.value || addMonths(c.start, 6) };
    } else c.recurrence = null;
    if (c.kind === "event") {
      c.disruption = {
        monthsBefore: parseInt(disBefore.value, 10) || 0,
        monthsAfter: parseInt(disAfter.value, 10) || 0,
        capacityReduction: parseFloat(disRed.value) || 0
      };
    } else c.disruption = null;
    c.window = (winEar.value || winLat.value)
      ? { earliest: winEar.value || null, latest: winLat.value || null } : null;
    c.dependsOn = Array.from(depList.querySelectorAll("input:checked")).map(cb => cb.value);
    // Save also drops aiProposalId — manual edit accepts the ghost.
    if (c.aiProposalId) c.aiProposalId = null;
    saveState(); render();
    document.getElementById("editor").classList.remove("open");
    editingClipId = null;
  };
  document.getElementById("editorDelete").onclick = () => {
    if (!confirm("Delete this clip?")) return;
    deleteClip(c.id);
    document.getElementById("editor").classList.remove("open");
    editingClipId = null;
  };
}
document.getElementById("editorClose").onclick =
document.getElementById("editorCancel").onclick = () => {
  document.getElementById("editor").classList.remove("open");
  editingClipId = null;
};

/* ============================================================================
   AI Composer
   ============================================================================ */
const ANTHROPIC_URL = "https://api.anthropic.com/v1/messages";
const COMPOSER_MODEL = "claude-sonnet-4-6";
const CHAT_HISTORY_CAP = 40;

function composerSystemPrompt() {
  return `You are Lifetracks Composer, an assistant that helps the user compose their life onto a multitrack timeline.

The metaphor: a Pro Tools session, where tracks are life domains (e.g. Fatherhood, Career, Health), and clips are goals (spans), events (points with disruption zones), recurring habits (repeating ticks), or milestones (flags).

Your job: turn natural-language intent into concrete, dated, editable structure — never vague advice. Propose specific clips on specific tracks with real dates and a one-line rationale in 'notes'.

Today is ${todayStr()}.

You MUST reply with a single JSON object — no prose outside JSON, no markdown code fence. Exact shape:

{
  "message": "your conversational reply to show in chat",
  "questions": ["optional clarifying questions, may be empty"],
  "proposal": {
    "newTracks": [ { "tempId": "t1", "name": "...", "color": "#5b8def" } ],
    "newClips":  [ {
      "tempId": "c1",
      "trackId": "<existing track id, or omit>",
      "trackTempId": "t1 if assigning to a new track, else omit",
      "kind": "goal" | "event" | "recurring" | "milestone",
      "title": "...",
      "start": "YYYY-MM-DD",
      "end": "YYYY-MM-DD or null (only goals have end)",
      "effort": 1,
      "recurrence": { "freq": "weekly" | "biweekly" | "monthly", "until": "YYYY-MM-DD" } | null,
      "disruption": { "monthsBefore": 0, "monthsAfter": 0, "capacityReduction": 0.0 } | null,
      "dependsOn": ["clipId or tempId", "..."],
      "notes": "one-line rationale"
    } ],
    "modifications": [ { "clipId": "<existing id>", "changes": { "start": "...", "title": "..." } } ],
    "removals": [ "<existing clip id>" ]
  }
}

Rules:
- All dates absolute YYYY-MM-DD.
- Reuse existing tracks when sensible; only propose new tracks for genuinely new domains.
- 'effort' is sustained monthly load: 1=trivial, 3=moderate, 5=consuming. RECURRING habit clips are almost always effort 1 or 2 — habits run in the background under foreground goals.

Portion control (HARD limits — overflow goes to a follow-up turn):
- AT MOST 1 new track per turn.
- AT MOST 8 new clips per turn (across all kinds).
- For big intents (becoming a parent, career pivot, marathon training), propose ONLY **Phase 1 — roughly the next 8–12 weeks**. State in 'message' what Phases 2 and 3 would cover, and offer to add them when the user is ready. Do not dump the whole arc.
- 'questions' and 'proposal' are MUTUALLY EXCLUSIVE in spirit: if you're asking clarifying questions, propose ≤ 3 clips (or none). Never ask "is this your first child?" while simultaneously proposing 23 clips that already assume the answer.

Capacity awareness (the state snapshot includes per-month capacity AND remaining capacity for the next 18 months under 'capacityForecast'):
- Your proposal must NOT push any month above its capacity. Stagger goal starts, shorten spans, or lower efforts to comply. If you had to trim intent to fit, say so in 'message'.
- For a major life event (e.g. becoming a parent), propose the event with a disruption zone first, then propose goals on relevant tracks whose effort/span RESPECTS the capacity dip — not goals that violate it.
- For "be a better son" or similar relational intents, include a recurring contact clip (effort 1–2), two concrete visit clips with real dates, and one milestone, each with a one-line 'notes' rationale.
- If unsure of the user's situation, ask 1–3 clarifying questions in 'questions' and keep the proposal small.`;
}

function composerStateSnapshot() {
  // Compact form for sending to the API: drop nulls and verbose fields.
  // Capacity forecast: for the next 18 months, what does the sequencer say about each
  // month's capacity and how much is already loaded? The Composer needs this to avoid
  // pushing months over capacity (P0-3).
  const forecast = [];
  if (lastSequencerResult) {
    const today = todayStr();
    for (let i = 0; i < 18; i++) {
      const m = monthKey(addMonths(today, i));
      const cap = lastSequencerResult.capByMonth.get(m);
      const load = lastSequencerResult.totalByMonth.get(m) || 0;
      if (cap == null) continue;
      forecast.push({
        month: m,
        capacity: +cap.toFixed(2),
        load: +load.toFixed(2),
        remaining: +(cap - load).toFixed(2)
      });
    }
  }
  return {
    today: todayStr(),
    settings: state.settings,
    tracks: state.tracks.map(t => ({ id: t.id, name: t.name, color: t.color, order: t.order, muted: t.muted, soloed: t.soloed })),
    clips: state.clips
      .filter(c => c.status !== "done" && c.status !== "skipped")
      .map(c => {
        const o = { id: c.id, trackId: c.trackId, kind: c.kind, title: c.title, start: c.start };
        if (c.end) o.end = c.end;
        if (c.effort) o.effort = c.effort;
        if (c.recurrence) o.recurrence = c.recurrence;
        if (c.disruption) o.disruption = c.disruption;
        if (c.dependsOn && c.dependsOn.length) o.dependsOn = c.dependsOn;
        if (c.window) o.window = c.window;
        if (c.notes) o.notes = c.notes;
        return o;
      }),
    capacityForecast: forecast,
    conflicts: (lastSequencerResult ? lastSequencerResult.conflicts : []).map(c => ({ kind: c.kind, severity: c.severity || null, msg: c.msg }))
  };
}

async function callComposer(userText) {
  if (!state.settings.apiKey) {
    pushComposerMessage("error", "No API key set. Open Settings (⚙) and paste your Anthropic key. (Lifetracks works fully without one — you just don't get the Composer.)");
    return;
  }
  const status = document.getElementById("composerStatus");
  status.textContent = "thinking…";

  // Build chat history for the API: alternating user/assistant, ending with the new user turn.
  const history = state.chat.slice(-CHAT_HISTORY_CAP);
  // The model needs the world state too; send it as a structured first user turn alongside the request.
  const worldState = composerStateSnapshot();
  const apiMessages = [];
  // Prepend prior turns
  for (const t of history) {
    apiMessages.push({ role: t.role, content: t.content });
  }
  // New user turn: include both the world snapshot and the user's intent.
  const userPayload = `Current Lifetracks state (JSON):\n${JSON.stringify(worldState, null, 2)}\n\nUser says: ${userText}`;
  apiMessages.push({ role: "user", content: userPayload });

  try {
    const res = await fetch(ANTHROPIC_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": state.settings.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: COMPOSER_MODEL,
        max_tokens: 4096,
        system: composerSystemPrompt(),
        messages: apiMessages
      })
    });
    if (!res.ok) {
      const errText = await res.text();
      pushComposerMessage("error", `API ${res.status}: ${errText.slice(0, 400)}`);
      status.textContent = "";
      return;
    }
    const data = await res.json();
    const rawText = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();

    // Record the raw turn in chat history (we keep the original userText, not the worldState payload).
    state.chat.push({ role: "user", content: userText, ts: Date.now() });
    state.chat.push({ role: "assistant", content: rawText, ts: Date.now() });
    if (state.chat.length > CHAT_HISTORY_CAP) state.chat = state.chat.slice(-CHAT_HISTORY_CAP);

    // Parse JSON — strip code fences if Claude added them despite instructions.
    let parsed = null, parseErr = null;
    const stripped = rawText.replace(/^```(?:json)?\s*/i, "").replace(/```\s*$/, "").trim();
    try { parsed = JSON.parse(stripped); } catch (e) { parseErr = e; }
    if (!parsed) {
      pushComposerMessage("assistant", rawText, null, { parseError: true });
    } else {
      pushComposerMessage("assistant", parsed.message || "(no message)", parsed, { parseError: false });
      if (parsed.proposal) applyProposalAsGhosts(parsed.proposal);
    }
    saveState();
    status.textContent = "";
  } catch (e) {
    pushComposerMessage("error", `Network error: ${e.message}`);
    status.textContent = "";
  }
}

function pushComposerMessage(role, content, parsed, opts) {
  const chat = document.getElementById("composerChat");
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = content;
  if (parsed) {
    if (parsed.questions && parsed.questions.length) {
      const q = document.createElement("div"); q.className = "questions";
      q.innerHTML = "<strong>Questions:</strong><br>" + parsed.questions.map(escapeHtml).join("<br>");
      div.appendChild(q);
    }
    if (parsed.proposal) {
      const p = parsed.proposal;
      const totals = (p.newTracks || []).length + (p.newClips || []).length + (p.modifications || []).length + (p.removals || []).length;
      if (totals > 0) {
        const s = document.createElement("div"); s.className = "proposal-summary";
        s.innerHTML = `Proposal: <strong>+${(p.newTracks || []).length}</strong> track(s), <strong>+${(p.newClips || []).length}</strong> clip(s), <strong>${(p.modifications || []).length}</strong> change(s), <strong>${(p.removals || []).length}</strong> removal(s).`;
        // Pre-accept conflict preview (P0-4)
        const delta = previewConflictDelta();
        if (delta) {
          const d = document.createElement("div");
          d.style.marginTop = "4px"; d.style.fontSize = "11px";
          if (delta.delta > 0) {
            d.style.color = "#e0a070";
            d.textContent = `If accepted: +${delta.delta} new conflict${delta.delta === 1 ? "" : "s"} (was ${delta.baselineCount}, would be ${delta.ghostCount}).`;
          } else if (delta.delta < 0) {
            d.style.color = "#7fd47f";
            d.textContent = `If accepted: ${-delta.delta} fewer conflict${delta.delta === -1 ? "" : "s"}.`;
          } else {
            d.style.color = "#8a93a3";
            d.textContent = `If accepted: no new conflicts.`;
          }
          s.appendChild(d);
        }
        const actions = document.createElement("div"); actions.className = "actions";
        const ok = document.createElement("button"); ok.className = "btn-primary"; ok.textContent = "Accept all";
        ok.onclick = () => acceptAllGhosts();
        const no = document.createElement("button"); no.textContent = "Dismiss all";
        no.onclick = () => dismissAllGhosts();
        actions.append(ok, no);
        s.appendChild(actions);
        // Per-track accept (P0-4): one button per track that has ghosts, so the user can take
        // the domain they're confident about and discuss the rest.
        const byTrack = getGhostsByTrack();
        if (byTrack.size > 1) {
          const trackRow = document.createElement("div");
          trackRow.style.display = "flex"; trackRow.style.flexWrap = "wrap"; trackRow.style.gap = "4px"; trackRow.style.marginTop = "6px";
          for (const [trackId, ghosts] of byTrack) {
            const trk = getTrack(trackId);
            if (!trk) continue;
            const b = document.createElement("button");
            b.style.fontSize = "11px"; b.style.padding = "2px 6px";
            b.textContent = `Accept ${trk.name} (${ghosts.length})`;
            b.title = `Accept the ${ghosts.length} ghost clip(s) on this track`;
            b.onclick = () => acceptGhostsByTrack(trackId);
            trackRow.appendChild(b);
          }
          s.appendChild(trackRow);
        }
        div.appendChild(s);
      }
    }
  }
  if (opts && opts.parseError) {
    const r = document.createElement("button"); r.textContent = "Retry"; r.style.marginTop = "6px";
    r.onclick = () => { /* let the user just re-send */ document.getElementById("composerInput").focus(); };
    div.appendChild(document.createElement("br"));
    div.appendChild(r);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function applyProposalAsGhosts(p) {
  // Map tempIds -> real ids for tracks/clips so dependsOn resolves later.
  const trackIdByTemp = new Map();
  for (const nt of (p.newTracks || [])) {
    const t = addTrackInternal(nt.name || "New Track", nt.color);
    // mark as ghost track via notes (so the user can keep or rename on accept-all)
    t.notes = "(AI proposal)";
    trackIdByTemp.set(nt.tempId, t.id);
  }
  const clipTempToId = new Map();
  for (const nc of (p.newClips || [])) {
    const id = uid();
    clipTempToId.set(nc.tempId || id, id);
    let trackId = nc.trackId;
    if (!trackId && nc.trackTempId) trackId = trackIdByTemp.get(nc.trackTempId);
    if (!trackId && state.tracks[0]) trackId = state.tracks[0].id;
    const clip = {
      id,
      trackId,
      kind: nc.kind || "goal",
      title: nc.title || "Untitled",
      notes: nc.notes || "",
      start: nc.start || todayStr(),
      end: nc.end || null,
      effort: Math.max(1, Math.min(5, parseInt(nc.effort, 10) || 3)),
      dependsOn: nc.dependsOn || [],
      recurrence: nc.recurrence || null,
      disruption: nc.disruption || null,
      window: nc.window || null,
      status: "planned",
      source: "ai",
      aiProposalId: "p_" + uid()
    };
    if (clip.kind === "goal" && !clip.end) clip.end = addMonths(clip.start, 3);
    state.clips.push(clip);
  }
  // resolve tempId references in dependsOn (do a pass after all clips inserted)
  for (const c of state.clips) {
    if (!c.aiProposalId) continue;
    c.dependsOn = (c.dependsOn || []).map(d => clipTempToId.get(d) || d);
  }
  // modifications & removals come from the proposal too — apply immediately (the spec calls these out as well).
  for (const m of (p.modifications || [])) {
    const c = getClip(m.clipId);
    if (!c) continue;
    Object.assign(c, m.changes || {});
  }
  for (const r of (p.removals || [])) {
    state.clips = state.clips.filter(c => c.id !== r);
  }
  saveState(); render();
}

// internal addTrack that doesn't re-render; used by applyProposalAsGhosts
function addTrackInternal(name, color) {
  const order = state.tracks.length;
  const t = {
    id: uid(), name: name || "New Track",
    color: color || PALETTE[order % PALETTE.length],
    order, muted: false, soloed: false, collapsed: false, notes: ""
  };
  state.tracks.push(t);
  return t;
}

// Run the sequencer twice — with ghost clips and without — to surface the delta the user
// would commit to by clicking Accept all. Cheap; runs only when there are ghosts and the
// proposal summary is being rendered. Does NOT depend on lastSequencerResult since the
// composer hydration can fire before the first full render.
function previewConflictDelta() {
  const ghostIds = new Set(state.clips.filter(c => c.aiProposalId).map(c => c.id));
  if (!ghostIds.size) return null;
  const withGhosts = runSequencer().conflicts;
  const saved = state.clips;
  state.clips = state.clips.filter(c => !ghostIds.has(c.id));
  const baseline = runSequencer().conflicts;
  state.clips = saved;
  return { delta: withGhosts.length - baseline.length, baselineCount: baseline.length, ghostCount: withGhosts.length };
}

function getGhostsByTrack() {
  const byTrack = new Map();
  for (const c of state.clips) {
    if (!c.aiProposalId) continue;
    if (!byTrack.has(c.trackId)) byTrack.set(c.trackId, []);
    byTrack.get(c.trackId).push(c);
  }
  return byTrack;
}

function acceptGhostsByTrack(trackId) {
  for (const c of state.clips) {
    if (c.aiProposalId && c.trackId === trackId) c.aiProposalId = null;
  }
  saveState(); render();
}

/* ============================================================================
   Toolbar / settings / shortcuts / wiring
   ============================================================================ */
function openSettings() {
  document.getElementById("settingApiKey").value = state.settings.apiKey || "";
  document.getElementById("settingHorizon").value = state.settings.horizonYears;
  document.getElementById("settingCapacity").value = state.settings.weeklyCapacity;
  document.getElementById("settingLookahead").value = state.settings.lookaheadDays;
  document.getElementById("settingsModal").classList.add("open");
}
function closeSettings() { document.getElementById("settingsModal").classList.remove("open"); }
document.getElementById("settingsBtn").onclick = openSettings;
document.getElementById("settingsClose").onclick = closeSettings;
document.getElementById("settingsCancel").onclick = closeSettings;
document.getElementById("settingsSave").onclick = () => {
  state.settings.apiKey = document.getElementById("settingApiKey").value.trim() || null;
  state.settings.horizonYears = Math.max(1, Math.min(50, parseInt(document.getElementById("settingHorizon").value, 10) || 5));
  state.settings.weeklyCapacity = Math.max(0.1, Math.min(3, parseFloat(document.getElementById("settingCapacity").value) || 1));
  state.settings.lookaheadDays = Math.max(1, Math.min(365, parseInt(document.getElementById("settingLookahead").value, 10) || 14));
  saveState(); render(); closeSettings();
};
document.getElementById("resetAll").onclick = () => {
  if (!confirm("Erase all tracks, clips, chat, and settings? This can't be undone (unless you exported a backup).")) return;
  state = defaultState();
  saveState(); render(); closeSettings();
};

document.getElementById("addTrackBtn").onclick = () => addTrack();
document.getElementById("addClipBtn").onclick = () => {
  if (!state.tracks.length) { alert("Add a track first."); return; }
  const c = addClip({});
  openEditor(c.id);
};
document.getElementById("composerBtn").onclick = () => {
  document.getElementById("composer").classList.add("open");
  document.getElementById("composerInput").focus();
};
document.getElementById("composerClose").onclick = () => {
  document.getElementById("composer").classList.remove("open");
};
document.getElementById("composerSend").onclick = () => {
  const ta = document.getElementById("composerInput");
  const text = ta.value.trim();
  if (!text) return;
  pushComposerMessage("user", text);
  ta.value = "";
  callComposer(text);
};
document.getElementById("composerInput").addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
    e.preventDefault();
    document.getElementById("composerSend").click();
  }
});
document.getElementById("composerClear").onclick = () => {
  if (!confirm("Clear Composer chat history?")) return;
  state.chat = [];
  document.getElementById("composerChat").innerHTML = "";
  saveState();
};
document.getElementById("discussConflictsBtn").onclick = () => {
  const conflicts = lastSequencerResult ? lastSequencerResult.conflicts : [];
  if (!conflicts.length) { alert("No conflicts to discuss."); return; }
  document.getElementById("composer").classList.add("open");
  const text = "Help me resolve these conflicts:\n" + conflicts.map(c => `- [${c.kind}] ${c.msg}`).join("\n");
  pushComposerMessage("user", text);
  callComposer(text);
};

document.getElementById("conflictHeader").onclick = () => {
  document.getElementById("conflictbar").classList.toggle("open");
};

document.getElementById("todayBtn").onclick = () => { centerOn(todayStr()); render(); };
document.getElementById("fitAllBtn").onclick = () => {
  const active = state.clips.filter(c => c.status !== "done" && c.status !== "skipped");
  if (!active.length) { centerOn(todayStr()); render(); return; }
  let minStr = active[0].start, maxStr = active[0].start;
  for (const c of active) {
    if (parseDate(c.start) < parseDate(minStr)) minStr = c.start;
    const endStr = c.kind === "goal" ? (c.end || c.start)
                : c.kind === "recurring" ? (c.recurrence?.until || c.start)
                : c.start;
    if (parseDate(endStr) > parseDate(maxStr)) maxStr = endStr;
  }
  // Include today + ~30 days margin on each side.
  if (parseDate(todayStr()) < parseDate(minStr)) minStr = todayStr();
  zoomToRange(minStr, maxStr);
};
document.getElementById("zoomInBtn").onclick = () => zoomBy(1.5);
document.getElementById("zoomOutBtn").onclick = () => zoomBy(1/1.5);

document.getElementById("exportBtn").onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `lifetracks-${todayStr()}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
};
document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
document.getElementById("importFile").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const obj = JSON.parse(text);
    // Validate: must look like a Lifetracks state object.
    if (!obj || typeof obj !== "object") throw new Error("not an object");
    if (!("version" in obj) && !("tracks" in obj || "clips" in obj))
      throw new Error("missing tracks/clips/version — not a Lifetracks file");
    if (!confirm(`Import will overwrite the current state with ${(obj.tracks||[]).length} track(s) and ${(obj.clips||[]).length} clip(s). Continue?`)) {
      e.target.value = ""; return;
    }
    state = migrate(obj);
    saveState();
    centerOn(todayStr());
    render();
  } catch (err) {
    alert("Import failed: " + err.message);
  }
  e.target.value = "";
});

document.getElementById("emptyComposer").onclick = () => {
  document.getElementById("composer").classList.add("open");
  document.getElementById("composerInput").focus();
};
document.getElementById("emptyTrack").onclick = () => addTrack();

// keyboard shortcuts
window.addEventListener("keydown", (e) => {
  const ae = document.activeElement;
  const inField = ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.isContentEditable);
  if (inField) return;
  if (e.key === "n" || e.key === "N") {
    if (!state.tracks.length) { alert("Add a track first."); return; }
    const c = addClip({}); openEditor(c.id);
  } else if (e.key === "t" || e.key === "T") {
    addTrack();
  } else if (e.key === " ") {
    e.preventDefault(); centerOn(todayStr()); render();
  } else if (e.key === "Escape") {
    document.getElementById("editor").classList.remove("open");
    document.getElementById("composer").classList.remove("open");
    closeSettings();
  }
});

// re-render on resize (timeline width changes)
window.addEventListener("resize", () => render());

// vertical-scroll sync between the track headers column and the timeline. We don't trigger a
// re-render on scroll — the SVG is sized to the full content height and the browser's native
// scroll moves it for us. Only the *other* pane's scrollTop needs to follow along.
(() => {
  const a = document.getElementById("trackHeaders");
  const b = document.getElementById("timelineWrap");
  let syncing = false;
  a.addEventListener("scroll", () => {
    if (syncing) return; syncing = true; b.scrollTop = a.scrollTop; syncing = false;
  });
  b.addEventListener("scroll", () => {
    if (syncing) return; syncing = true; a.scrollTop = b.scrollTop; syncing = false;
  });
})();

// hydrate composer chat from saved history
function hydrateComposer() {
  const chat = document.getElementById("composerChat");
  chat.innerHTML = "";
  for (const m of state.chat) {
    if (m.role === "user") pushComposerMessage("user", m.content);
    else {
      // try to parse and render proposal summary inline
      const stripped = (m.content || "").replace(/^```(?:json)?\s*/i, "").replace(/```\s*$/, "").trim();
      let parsed = null;
      try { parsed = JSON.parse(stripped); } catch {}
      if (parsed) pushComposerMessage("assistant", parsed.message || m.content, parsed, { parseError: false });
      else pushComposerMessage("assistant", m.content, null, { parseError: true });
    }
  }
}

// initial center + render (deferred one frame so the grid layout has settled)
hydrateComposer();
requestAnimationFrame(() => {
  centerOn(todayStr());
  render();
});
// ResizeObserver: re-render when the timeline wrap is resized for any reason
// (window resize is covered, but the conflict panel opening also changes height).
new ResizeObserver(() => render()).observe(document.getElementById("timelineWrap"));
</script>
